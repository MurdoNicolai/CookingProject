version: "3.9"

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: murdo
      POSTGRES_PASSWORD: n9XLSLHx
    ports:
      - "5433:5432"
    restart: unless-stopped
    init: true
    stop_grace_period: 5s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "CookingV2.asgi:application"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      DATABASE_URL: postgresql://murdo:n9XLSLHx@db:5432/postgres
    depends_on:
      - db
    init: true
    stop_signal: SIGINT
    stop_grace_period: 5s
    restart: unless-stopped

  tailwind:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && while true; do npx @tailwindcss/cli -i ./theme/static_src/src/styles.css -o ./theme/static/css/dist/styles.css; sleep 2; done"
    volumes:
      - .:/app

volumes:
  postgres_data:
